name: kigali_city_directory

description: A Flutter app for Kigali City Services & Places Directory

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.13.0
  provider: ^6.1.1
  google_maps_flutter: ^2.5.3
  url_launcher: ^6.2.5
  flutter_local_notifications: ^16.3.2
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
